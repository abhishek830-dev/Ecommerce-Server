<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greetings from JS</title>
    <style>
        div.first>h1 {
            color: red;
        }
    </style>
</head>

<body>
    <div class="first">
        <h1>Welcome Pinki to the classes</h1>
        <h1>Welcome Pinki to the classes</h1>
        <h1>Welcome Pinki to the classes</h1>
        <h1>Welcome Pinki to the classes</h1>
        <h1>Welcome Pinki to the classes</h1>
        <div class="container">
            <div class="box">
                <div class="section">
                    <h1>Welcome to block</h1>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
<script>
    /**
     * 1. Get all the elements
     * 2. Iterate a loop & Update the element text
    */



    const h1Elems = document.querySelectorAll("div.box > h1");
    console.log(h1Elems);

    for (let i = 0; i < h1Elems.length; i++) {
        h1Elems[i].textContent = "Hello Rahul to the classes";
    }
</script>
