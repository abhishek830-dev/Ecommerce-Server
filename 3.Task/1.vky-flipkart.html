      .main_container {

        flex-wrap: wrap;
      }
      .item_container {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        padding: 12px;
        gap: 12px;
        background-color: #fff;
        flex: 1;
        min-width: 280px;
      }
      .item {

        /* flex: 0 0 48%; */

      .main_item1 {

      }
      .imgg {
        width: 100%;
        height: auto;
        object-fit: contain;
      }
      .main_item2 {

        flex-direction: column;
        justify-content: space-evenly;
        gap: 2px;
      }
      .fashion {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .item_container3 {
        padding: 12px;
        border: 1px solid lightskyblue;
      }
      h4 {
        margin: 0;
        font-weight: lighter;
      }
      strong {
        color: rgb(94, 152, 6);
        font-weight: 600px;
      }
      h1 {
        background-color: aqua;
        margin: 0;
        margin-bottom: 40px;
        padding: 12px;
      }

      .item_single {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 12px;
      }

      @media (min-width: 324px) and (max-width: 995px) {
        .main_container {
          flex-direction: column;
          align-items: center;
        }

        .item_container {
          max-width: 100%;
        }

        .item {
          width: 48%;
          padding: 22px;
        }
      }

      @media (max-width: 323px) {
        .item {
          width: 100%;
        }
      }
    </style>
