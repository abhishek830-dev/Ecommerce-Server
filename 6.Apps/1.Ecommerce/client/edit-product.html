<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Product</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-brand">🛒 Ecomm Manager</div>
    <ul class="nav-links">
      <li><a href="index.html">Dashboard</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="add-product.html">Add Product</a></li>
      <li><a href="categories.html">Categories</a></li>
    </ul>
  </nav>

  <main class="container">

    <h1 class="page-title">Edit Product</h1>

    <div class="form-container">

      <!-- Status Message -->
      <p id="statusText" class="status-text"></p>

      <!-- Form -->
      <div class="form-group">
        <label for="title">Title</label>
        <input type="text" id="title" class="input" placeholder="Product title" />
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" class="input" rows="4" placeholder="Product description"></textarea>
      </div>

      <div class="form-group">
        <label for="price">Price</label>
        <input type="number" id="price" class="input" placeholder="99.99" step="0.01" />
      </div>

      <div class="form-group">
        <label for="category">Category</label>
        <select id="category" class="input">
          <option value="">Select Category</option>
          <option value="Electronics">Electronics</option>
          <option value="Clothing">Clothing</option>
          <option value="Books">Books</option>
          <option value="Sports">Sports</option>
          <option value="Home">Home</option>
          <option value="Beauty">Beauty</option>
          <option value="Toys">Toys</option>
        </select>
      </div>

      <div class="form-group">
        <label for="brand">Brand</label>
        <input type="text" id="brand" class="input" placeholder="Brand name" />
      </div>

      <div class="form-group">
        <label for="rating">Rating (1-5)</label>
        <input type="number" id="rating" class="input" placeholder="4.5" min="1" max="5" step="0.1" />
      </div>

      <div class="form-group">
        <label for="stock">Stock</label>
        <input type="number" id="stock" class="input" placeholder="100" min="0" />
      </div>

      <div class="form-actions">
        <button id="updateBtn" class="btn btn-primary">💾 Update Product</button>
        <a href="products.html" class="btn btn-secondary">Cancel</a>
      </div>

    </div>

  </main>

  <script src="config.js"></script>
  <script src="edit-product.js"></script>

</body>
</html>
