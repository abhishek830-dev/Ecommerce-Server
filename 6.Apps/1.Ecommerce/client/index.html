<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Commerce Store</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <div class="container">
        <div class="header-content">
          <div class="logo">E-Shop</div>
          <nav class="nav-links">
            <a href="#home">Home</a>
            <a href="seller.html">Seller</a>
          </nav>
          <div class="auth-buttons">
            <button id="login-btn" class="btn btn-secondary">Login</button>
            <button id="signup-btn" class="btn btn-primary">Sign Up</button>
            <a href="#" class="cart-toggle btn btn-success">
              <span class="icon-cart" aria-hidden="true"></span>
              Cart (<span id="cart-count">0</span>)
            </a>
          </div>
        </div>
      </div>
    </header>
    <div id="toast-container" class="toast-container"></div>
    <div id="cart-backdrop" class="cart-backdrop"></div>

    <main>
      <div class="container">
        <section id="home">
          <div class="section-header">
            <h2>Products</h2>
            <p class="section-subtitle">
              Browse items by category and add them to your cart.
            </p>
          </div>

          <!-- Filters -->
          <div id="filters" class="filters" style="margin-bottom: 2rem">
            <div class="form-row">
              <div class="form-group">
                <label for="category-filter" class="form-label">Category</label>
                <select id="category-filter" class="form-input">
                  <option value="">All Categories</option>
                </select>
              </div>
              <div class="form-group">
                <label for="search-filter" class="form-label">Search</label>
                <input
                  type="text"
                  id="search-filter"
                  class="form-input"
                  placeholder="Search products..."
                />
              </div>
              <div class="form-group">
                <label for="sort-filter" class="form-label">Sort By</label>
                <select id="sort-filter" class="form-input">
                  <option value="createdAt_DESC">Newest First</option>
                  <option value="createdAt_ASC">Oldest First</option>
                  <option value="price_ASC">Price: Low to High</option>
                  <option value="price_DESC">Price: High to Low</option>
                  <option value="rating_DESC">Highest Rated</option>
                  <option value="title_ASC">Name A-Z</option>
                  <option value="title_DESC">Name Z-A</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="min-price-filter" class="form-label"
                  >Min Price</label
                >
                <input
                  type="number"
                  id="min-price-filter"
                  class="form-input"
                  placeholder="0"
                />
              </div>
              <div class="form-group">
                <label for="max-price-filter" class="form-label"
                  >Max Price</label
                >
                <input
                  type="number"
                  id="max-price-filter"
                  class="form-input"
                  placeholder="1000"
                />
              </div>
              <div class="form-group">
                <label for="rating-filter" class="form-label">Min Rating</label>
                <select id="rating-filter" class="form-input">
                  <option value="">Any Rating</option>
                  <option value="4">4+ Stars</option>
                  <option value="3">3+ Stars</option>
                  <option value="2">2+ Stars</option>
                  <option value="1">1+ Stars</option>
                </select>
              </div>
            </div>
            <button
              id="apply-filters"
              class="btn btn-primary"
              style="margin-top: 1rem"
            >
              Apply Filters
            </button>
            <button
              id="clear-filters"
              class="btn btn-secondary"
              style="margin-top: 1rem; margin-left: 1rem"
            >
              Clear Filters
            </button>
          </div>

          <!-- Products Grid -->
          <div id="products-container" class="products-grid">
            <!-- Products will be loaded here -->
          </div>

          <!-- Pagination -->
          <div
            id="pagination"
            class="pagination"
            style="text-align: center; margin-top: 2rem"
          >
            <!-- Pagination buttons will be loaded here -->
          </div>
        </section>
      </div>
    </main>

    <!-- Cart Sidebar -->
    <div class="cart-sidebar">
      <div class="cart-header">
        <h3>Shopping Cart</h3>
        <button class="close-cart btn btn-secondary">&times;</button>
      </div>
      <div id="cart-items" class="cart-items">
        <!-- Cart items will be loaded here -->
      </div>
      <div class="cart-total">Total: $<span id="cart-total">0.00</span></div>
      <button id="checkout-btn" class="btn btn-success checkout-btn">
        Checkout
      </button>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title">Login</h2>
        </div>
        <div class="modal-body">
          <form id="login-form">
            <div class="form-group">
              <label for="login-email" class="form-label">Email</label>
              <input
                type="email"
                id="login-email"
                class="form-input"
                required
              />
            </div>
            <div class="form-group">
              <label for="login-password" class="form-label">Password</label>
              <input
                type="password"
                id="login-password"
                class="form-input"
                required
              />
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
          </form>
          <p style="margin-top: 1rem; text-align: center">
            Don't have an account? <a href="#" id="switch-to-signup">Sign up</a>
          </p>
        </div>
      </div>
    </div>

    <!-- Signup Modal -->
    <div id="signup-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title">Sign Up</h2>
        </div>
        <div class="modal-body">
          <form id="signup-form">
            <div class="form-group">
              <label for="signup-name" class="form-label">Name</label>
              <input type="text" id="signup-name" class="form-input" required />
            </div>
            <div class="form-group">
              <label for="signup-email" class="form-label">Email</label>
              <input
                type="email"
                id="signup-email"
                class="form-input"
                required
              />
            </div>
            <div class="form-group">
              <label for="signup-password" class="form-label">Password</label>
              <input
                type="password"
                id="signup-password"
                class="form-input"
                required
              />
            </div>
            <button type="submit" class="btn btn-primary">Sign Up</button>
          </form>
          <p style="margin-top: 1rem; text-align: center">
            Already have an account? <a href="#" id="switch-to-login">Login</a>
          </p>
        </div>
      </div>
    </div>

    <!-- Address Modal -->
    <div id="address-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title">Shipping Address</h2>
        </div>
        <div class="modal-body">
          <form id="address-form">
            <div class="form-group">
              <label for="address-name" class="form-label">Full Name</label>
              <input
                type="text"
                id="address-name"
                class="form-input"
                required
              />
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="address-street" class="form-label"
                  >Street Address</label
                >
                <input
                  type="text"
                  id="address-street"
                  class="form-input"
                  required
                />
              </div>
              <div class="form-group">
                <label for="address-city" class="form-label">City</label>
                <input
                  type="text"
                  id="address-city"
                  class="form-input"
                  required
                />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="address-state" class="form-label">State</label>
                <input
                  type="text"
                  id="address-state"
                  class="form-input"
                  required
                />
              </div>
              <div class="form-group">
                <label for="address-zip" class="form-label">ZIP Code</label>
                <input
                  type="text"
                  id="address-zip"
                  class="form-input"
                  required
                />
              </div>
            </div>
            <div class="form-group">
              <label for="address-phone" class="form-label">Phone Number</label>
              <input
                type="tel"
                id="address-phone"
                class="form-input"
                required
              />
            </div>
            <button type="submit" class="btn btn-primary">
              Continue to Payment
            </button>
          </form>
        </div>
      </div>
    </div>

    <!-- Product Details Modal -->
    <div id="product-modal" class="modal">
      <div class="modal-content" style="max-width: 800px">
        <div class="modal-header">
          <h2 id="product-modal-title" class="modal-title">Product Details</h2>
          <button class="close-modal btn btn-secondary">&times;</button>
        </div>
        <div class="modal-body">
          <div id="product-details" class="product-details">
            <!-- Product details will be loaded here -->
          </div>
        </div>
      </div>
    </div>

    <footer>
      <div class="container">
        <p>&copy; 2024 E-Shop. All rights reserved.</p>
      </div>
    </footer>

    <script src="js/common.js"></script>
    <script src="js/home.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
  </body>
</html>
